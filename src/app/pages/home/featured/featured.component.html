<div class="main" *ngIf="products.length">
    <div class="title">{{ 'featured.title' | translate }}</div>
    <div class="subtitle">{{ 'featured.subtitle' | translate }}</div>
</div>

<div class="cards" *ngIf="products.length">
    <my-card *ngFor="let product of products" [product]="product"></my-card>
</div>
