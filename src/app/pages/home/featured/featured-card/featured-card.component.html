<div class="card">
    <div class="heart"><img src="../../../../../assets/icons/cuore_vuoto.svg" alt="icon"></div>
    <div class="top">
        <img src="../../../../../assets/images/box.webp" alt="product">
    </div>
    <div class="bottom">
        <div>
            <div class="brand">Pokémon - ETB</div>
            <div class="title">ETB - Segreto fiabesco</div>
        </div>

            <div class="price">{{ 29.90 | currency:'EUR' }}</div>
            <div class="actions">
                <div class="availability">{{ 'home.featured.card.available' | translate }}</div>
                <button>{{ 'home.featured.card.add_to_cart' | translate | uppercase }} <img src="../../../../../assets/icons/carrello_vuoto.svg" alt="icon"></button>

        </div>
    </div>
