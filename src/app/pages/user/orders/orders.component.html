<table>
    <thead>
        <th>id</th>
        <th>data</th>
        <th>totale</th>
        <th>stato</th>
    </thead>
    <tbody>
        <tr *ngFor="let order of getOrders()">
            <td>{{ order.id }}</td>
            <td>{{ order.createdAt | date:'dd/MM/yyyy HH:mm' }}</td>
            <td>{{ order.total | currency:'EUR' }}</td>
            <td>
                <div [class]="'tag s' + order.status">{{ 'user.orders.status.' + order.status | translate }}</div>
            </td>
        </tr>
    </tbody>
</table>
